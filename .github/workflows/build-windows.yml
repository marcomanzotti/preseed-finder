name: Build Windows app

# Costruisce un singolo file "Preseed Finder.exe" su un runner Windows
# (PyInstaller non cross-compila da macOS). L'exe e' pubblicato come
# artifact su Actions: si scarica e si lancia, niente cartelle, niente zip
# da spiegare.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: >
          pyinstaller --noconfirm --clean --windowed --onefile
          --name "Preseed Finder"
          --icon assets/app.ico
          --add-data ".env.example;."
          --hidden-import webapp
          --hidden-import main
          --hidden-import store
          --hidden-import dedupe
          --hidden-import config
          --hidden-import enrich
          --hidden-import email_finder
          --hidden-import llm_enrich
          --hidden-import sources
          --hidden-import sources.yc
          --hidden-import sources.antler
          --hidden-import sources.cordis
          --hidden-import sources.producthunt
          --hidden-import sources.rockstart
          --hidden-import sources.entrepreneur_first
          --hidden-import sources.betalist
          --hidden-import sources.crunchbase
          app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PreseedFinder-Windows
          path: dist/Preseed Finder.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Preseed Finder.exe
